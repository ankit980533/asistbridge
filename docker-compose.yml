version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: assistbridge-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=assistbridge

  backend:
    build: ./backend
    container_name: assistbridge-backend
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/assistbridge

  admin-dashboard:
    build: ./admin-dashboard
    container_name: assistbridge-admin
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api

volumes:
  mongodb_data:
