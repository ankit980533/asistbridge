name: assistbridge
description: Help Platform for Visually Impaired
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  dio: ^5.4.0
  
  # Location
  geolocator: ^11.0.0
  geocoding: ^2.1.1
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Speech to Text
  speech_to_text: ^6.6.0
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  firebase_auth: ^4.16.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  
  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.2
  
  # Text to Speech for accessibility
  flutter_tts: ^3.8.5
  
  # Vibration feedback
  vibration: ^1.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
